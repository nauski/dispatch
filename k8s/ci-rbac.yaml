apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatch-ci
  namespace: dispatch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dispatch-ci-deployer
  namespace: dispatch
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dispatch-ci-deployer
  namespace: dispatch
subjects:
  - kind: ServiceAccount
    name: dispatch-ci
    namespace: dispatch
roleRef:
  kind: Role
  name: dispatch-ci-deployer
  apiGroup: rbac.authorization.k8s.io
