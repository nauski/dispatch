apiVersion: v1
kind: Secret
metadata:
  name: dispatch-secrets
  namespace: dispatch
type: Opaque
stringData:
  DATABASE_URL: "postgres://dispatch:CHANGEME@your-postgres-host:5432/dispatch"
  # Keycloak is optional — omit these if using API key auth only
  # KEYCLOAK_ISSUER: "https://keycloak.example.com/realms/master"
  # KEYCLOAK_JWKS_URI: "https://keycloak.example.com/realms/master/protocol/openid-connect/certs"
  # KEYCLOAK_CLIENT_ID: "dispatch"
